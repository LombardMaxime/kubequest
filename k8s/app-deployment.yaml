apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: kubequest
  labels:
    app.kubernetes.io/name: kubequest-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kubequest-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubequest-app
    spec:
      containers:
        - name: app
          image: ghcr.io/lombardmaxime/kubequest-app:v1
          ports:
            - containerPort: 80
          env:
            - name: APP_ENV
              value: "dev"
            - name: DB_CONNECTION
              value: "mysql"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_KEY
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
