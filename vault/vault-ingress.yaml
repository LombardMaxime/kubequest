apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-cert
  namespace: vault
spec:
  secretName: vault-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - vault.vortex-tcg.online
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vault-secure
  namespace: vault
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vault.vortex-tcg.online`)
      kind: Rule
      services:
        - name: vault-ui
          port: 8200
  tls:
    secretName: vault-tls
